name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run lint
        run: npm run lint
        
      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_BLOCKCHAIN_RPC_URL: ${{ secrets.NEXT_PUBLIC_BLOCKCHAIN_RPC_URL || 'https://eth-sepolia.g.alchemy.com/v2/KEY' }}
          NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.NEXT_PUBLIC_CONTRACT_ADDRESS || '0x0' }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY || 'key' }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY || 'secret' }}

  contracts:
    name: Soroban Contracts CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust-contracts/medichain
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
          
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
            
      - name: Check formatting
        run: cargo fmt -- --check
        
      - name: Run clippy
        run: cargo clippy -- -D warnings
        
      - name: Run tests
        run: cargo test
        
      - name: Build contract (WASM)
        run: cargo build --target wasm32-unknown-unknown --release
